services:
  # Backend API
  - type: web
    name: taskflow-backend
    env: python
    region: oregon
    buildCommand: pip install -r agent_service/requirements.txt
    startCommand: cd agent_service && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: task_orchestrator
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AGENTOPS_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0

  # Frontend (Next.js)
  - type: web
    name: taskflow-frontend
    env: node
    region: oregon
    buildCommand: cd web_app && npm install && npm run build
    startCommand: cd web_app && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://taskflow-backend.onrender.com
      - key: NODE_VERSION
        value: 18.17.0
